services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restaurant_ai}
      POSTGRES_USER: ${POSTGRES_USER:-restaurant_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restaurant_ai_demo_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restaurant_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://restaurant_ai:restaurant_ai_demo_password@db:5432/restaurant_ai}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-restaurant_ai_local_demo_secret_change_before_production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@restaurantai.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
      DEMO_OWNER_EMAIL: ${DEMO_OWNER_EMAIL:-owner@restaurantai.com}
      DEMO_OWNER_PASSWORD: ${DEMO_OWNER_PASSWORD:-owner12345}
      RATE_LIMIT_CHAT_PER_MINUTE: ${RATE_LIMIT_CHAT_PER_MINUTE:-10}
      RATE_LIMIT_RESERVATIONS_PER_MINUTE: ${RATE_LIMIT_RESERVATIONS_PER_MINUTE:-5}
      RATE_LIMIT_ORDERS_PER_MINUTE: ${RATE_LIMIT_ORDERS_PER_MINUTE:-10}
      RATE_LIMIT_PUBLIC_PER_MINUTE: ${RATE_LIMIT_PUBLIC_PER_MINUTE:-100}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    environment:
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads:
