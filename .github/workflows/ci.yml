name: CI

on:
  pull_request:
  push:
    branches:
      - ai-production-saas-upgrade
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests when available
        run: |
          if node -e "const scripts = require('./package.json').scripts || {}; process.exit(scripts.test ? 0 : 1)"; then
            npm run test
          else
            echo "No frontend test script found; skipping."
          fi

      - name: Build frontend
        run: npm run build
